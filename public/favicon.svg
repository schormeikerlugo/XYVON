<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="XYVON — Science-Led Electrolytes">
  <!-- Deep black rounded square -->
  <rect width="64" height="64" rx="14" fill="#0B0B0C"/>

  <!-- Premium hairline frame -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="11.5" fill="none" stroke="#F5F2EE" stroke-width="0.6" opacity="0.09"/>

  <!-- Molecular bonds radiating from central nucleus (forming an X) -->
  <g stroke-linecap="round" fill="none">
    <line x1="32" y1="32" x2="20" y2="20" stroke="#F5F2EE" stroke-width="2"/>
    <line x1="32" y1="32" x2="44" y2="20" stroke="#F5F2EE" stroke-width="2"/>
    <line x1="32" y1="32" x2="20" y2="44" stroke="#F5F2EE" stroke-width="2"/>
    <!-- Copper accent bond -->
    <line x1="32" y1="32" x2="44" y2="44" stroke="#B87333" stroke-width="2"/>
  </g>

  <!-- Terminal atoms -->
  <circle cx="20" cy="20" r="3.2" fill="#F5F2EE"/>
  <circle cx="44" cy="20" r="3.2" fill="#F5F2EE"/>
  <circle cx="20" cy="44" r="3.2" fill="#F5F2EE"/>

  <!-- Copper atom — the "built by its founder" accent -->
  <circle cx="44" cy="44" r="3.8" fill="#B87333"/>

  <!-- Central nucleus — carved from background so it reads crisp at tiny sizes -->
  <circle cx="32" cy="32" r="2.6" fill="#0B0B0C" stroke="#F5F2EE" stroke-width="1.4"/>
</svg>
